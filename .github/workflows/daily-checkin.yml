name: Luogu Daily Check-in

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run check-in
        env:
          _uid: ${{ secrets._uid }}
          __client_id: ${{ secrets.__client_id }}
        run: node src/checkin.js
