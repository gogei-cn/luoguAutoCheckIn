name: Luogu Daily Check-in

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run check-in
        env:
          LUOGU_UID: ${{ secrets.LUOGU_UID }}
          LUOGU_CLIENT_ID: ${{ secrets.LUOGU_CLIENT_ID }}
        run: node src/checkin.js
